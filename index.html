<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumpsum Investment Calculator</title>
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Custom Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Main Container -->
    <div class="container">
        <div class="content-wrapper">
            <!-- Header -->
            <header class="header">
                <h1>Lumpsum Investment Calculator</h1>
                <p class="subtitle">Calculate your investment returns with ease</p>
            </header>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Input Section -->
                <section class="input-section">
                    <div class="card input-card">
                        <h2>Investment Details</h2>

                        <!-- Investment Amount Input -->
                        <div class="input-group">
                            <label for="investmentAmount" class="input-label">
                                <span class="label-text">Investment Amount</span>
                                <span class="currency-symbol">₹</span>
                            </label>
                            <input 
                                type="number" 
                                id="investmentAmount" 
                                class="input-field" 
                                placeholder="Enter amount in ₹"
                                min="1"
                                value="100000"
                            >
                            <input 
                                type="range" 
                                id="investmentSlider" 
                                class="slider" 
                                min="1" 
                                max="10000000" 
                                value="100000"
                                step="10000"
                            >
                            <div class="slider-labels">
                                <span>₹1</span>
                                <span>₹1Cr</span>
                            </div>
                        </div>

                        <!-- Expected Rate of Return Input -->
                        <div class="input-group">
                            <label for="rateOfReturn" class="input-label">
                                <span class="label-text">Expected Rate of Return</span>
                                <span class="rate-display" id="rateDisplay">10%</span>
                            </label>
                            <input 
                                type="number" 
                                id="rateOfReturn" 
                                class="input-field" 
                                placeholder="Enter rate of return in %"
                                min="0"
                                max="100"
                                step="0.5"
                                value="10"
                            >
                            <input 
                                type="range" 
                                id="rateSlider" 
                                class="slider" 
                                min="0" 
                                max="100" 
                                value="10"
                                step="0.5"
                            >
                            <div class="slider-labels">
                                <span>0%</span>
                                <span>100%</span>
                            </div>
                        </div>

                        <!-- Tenure in Years Input -->
                        <div class="input-group">
                            <label for="tenure" class="input-label">
                                <span class="label-text">Tenure in Years</span>
                                <span class="tenure-display" id="tenureDisplay">10 years</span>
                            </label>
                            <input 
                                type="number" 
                                id="tenure" 
                                class="input-field" 
                                placeholder="Enter tenure in years (max 50)"
                                min="1"
                                max="50"
                                value="10"
                            >
                            <input 
                                type="range" 
                                id="tenureSlider" 
                                class="slider" 
                                min="1" 
                                max="50" 
                                value="10"
                            >
                            <div class="slider-labels">
                                <span>1 yr</span>
                                <span>50 yrs</span>
                            </div>
                        </div>

                        <!-- Action Buttons -->
                        <div class="button-group">
                            <button id="calculateBtn" class="btn btn-primary">Calculate</button>
                            <button id="resetBtn" class="btn btn-secondary">Reset</button>
                        </div>
                    </div>
                </section>

                <!-- Results Section -->
                <section class="results-section" id="resultsSection" style="display: none;">
                    <!-- Results Card -->
                    <div class="card results-card">
                        <h2>Investment Summary</h2>
                        <div class="results-grid">
                            <!-- Invested Amount -->
                            <div class="result-item">
                                <div class="result-label">Invested Amount</div>
                                <div class="result-value invested-amount" id="investedAmount">₹0</div>
                            </div>

                            <!-- Estimated Returns -->
                            <div class="result-item">
                                <div class="result-label">Estimated Returns</div>
                                <div class="result-value estimated-returns" id="estimatedReturns">₹0</div>
                            </div>

                            <!-- Total Value -->
                            <div class="result-item">
                                <div class="result-label">Total Value</div>
                                <div class="result-value total-value" id="totalValue">₹0</div>
                            </div>
                        </div>
                    </div>

                    <!-- Chart Card -->
                    <div class="card chart-card">
                        <h2>Investment Breakdown</h2>
                        <div class="chart-container">
                            <canvas id="investmentChart"></canvas>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <!-- Custom Script -->
    <script src="script.js"></script>
</body>
</html>
